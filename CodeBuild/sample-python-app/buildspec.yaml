version: 0.2
env:
  parameter-store:
    DOCKER_REGISTRY_USERNAME: /myfirstapp/docker-credentials/username
    DOCKER_REGISTRY_PASSWORD: /myfirstapp/docker-credentials/password
    DOCKER_REGISTRY_URL: /myfirstapp/docker-credentials/docker_registry_url
phases:
  install:
    runtime-versions:
      python: 3.12
  pre_build:
    commands:
      - echo "Installing dependencies..."
      - pip install -r CodeBuild/sample-python-app/requirements.txt
  build:
    commands:
      - cd CodeBuild/sample-python-app
      - echo "building Docker Image"
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin "$DOCKER_REGISTRY_URL"
      - docker build -t "$DOCKER_REGISTRY_URL/$DOCKER_REGISTRY_USERNAME/simple-python-flask-app:latest" .
      - docker push "$DOCKER_REGISTRY_URL/$DOCKER_REGISTRY_USERNAME/simple-python-flask-app:latest"
  post_build:
    commands:
      - echo "build is successful!"
