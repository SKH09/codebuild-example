version: 0.2
artifacts:
  files:
    - "appspec.yml"
    - "app.py"
    - "Dockerfile"
    - "requirements.txt"
env:
  parameter-store:
    DOCKER_REGISTRY_USERNAME: "/myfirstapp/docker-credentials/username"
    DOCKER_REGISTRY_PASSWORD: "/myfirstapp/docker-credentials/password"
phases:
  install:
    runtime-versions:
      python: 3.12
  pre_build:
    commands:
      - pip install -r CodeBuild/sample-python-app/requirements.txt
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin
  build:
    commands:
      - cd CodeBuild/sample-python-app
      - echo "building Docker Image"
      - docker build -t "$DOCKER_REGISTRY_USERNAME/simple-python-flask-app:latest" .
      - docker push "$DOCKER_REGISTRY_USERNAME/simple-python-flask-app:latest"
  post_build:
    commands:
      - echo "build is successful!"
