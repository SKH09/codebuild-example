version: 0.0
os: linux
file_exists_behavior: OVERWRITE

files:
  - source: /
    destination: /home/ubuntu/sample-python-flask-app

hooks:
  ApplicationStop:
    - location: scripts/stop_container.sh
      timeout: 30
      runas: root
  AfterInstall:
    - location: scripts/start_container.sh
      timeout: 30
      runas: root